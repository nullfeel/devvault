<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="src/popup.css">
</head>
<body>
  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="screen active">
    <div class="login-wrapper">
      <div class="login-logo">
        <svg class="icon" width="28" height="28" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
        <span class="login-brand">DevVault</span>
      </div>
      <p class="login-subtitle">Secure password manager</p>

      <form id="login-form" class="login-form" autocomplete="on">
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <div class="input-with-action">
            <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password">
            <button type="button" id="login-toggle-pw" class="input-action" aria-label="Toggle password">
              <svg class="icon eye-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M10 3C5.5 3 1.7 5.9.5 10c1.2 4.1 5 7 9.5 7s8.3-2.9 9.5-7c-1.2-4.1-5-7-9.5-7zm0 11.5c-2.5 0-4.5-2-4.5-4.5s2-4.5 4.5-4.5 4.5 2 4.5 4.5-2 4.5-4.5 4.5zm0-7.2c-1.5 0-2.7 1.2-2.7 2.7s1.2 2.7 2.7 2.7 2.7-1.2 2.7-2.7-1.2-2.7-2.7-2.7z"/></svg>
              <svg class="icon eye-off-icon hidden" viewBox="0 0 20 20" fill="currentColor"><path d="M3.7 2.3L2.3 3.7l3 3C3.2 8.2 1.6 9.9.5 10c1.2 4.1 5 7 9.5 7 1.7 0 3.3-.4 4.7-1.2l3.1 3.1 1.4-1.4-15.5-15.2zM10 15.5c-2.5 0-4.5-2-4.5-4.5 0-.9.3-1.7.7-2.4l1.5 1.5c0 .3-.2.6-.2.9 0 1.5 1.2 2.7 2.7 2.7.3 0 .6-.1.9-.2l1.5 1.5c-.8.3-1.6.5-2.6.5zm7.1-3.1c.5-.7.9-1.5 1.2-2.4-1.2-4.1-5-7-9.5-7-.8 0-1.6.1-2.3.3l1.7 1.7c.2 0 .4-.1.6-.1 2.5 0 4.5 2 4.5 4.5 0 .2 0 .4-.1.6l3.9 3.9z"/></svg>
            </button>
          </div>
        </div>
        <p id="login-error" class="error-text hidden"></p>
        <button type="submit" id="login-btn" class="btn btn-primary btn-full">
          <span class="btn-text">Sign in</span>
          <span class="btn-loader hidden"><span class="loading"></span></span>
        </button>
      </form>

      <button id="login-server-link" class="server-link">
        <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M2 5a2 2 0 012-2h12a2 2 0 012 2v2a2 2 0 01-2 2H4a2 2 0 01-2-2V5zm14 1a1 1 0 11-2 0 1 1 0 012 0zM2 13a2 2 0 012-2h12a2 2 0 012 2v2a2 2 0 01-2 2H4a2 2 0 01-2-2v-2zm14 1a1 1 0 11-2 0 1 1 0 012 0z" clip-rule="evenodd"/></svg>
        <span id="server-url-display">localhost:3000</span>
      </button>
    </div>
  </div>

  <!-- MAIN SCREEN -->
  <div id="main-screen" class="screen">
    <header class="topbar">
      <div class="topbar-brand">
        <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 1.944A11.954 11.954 0 012.166 5C2.056 5.649 2 6.319 2 7c0 5.225 3.34 9.67 8 11.317C14.66 16.67 18 12.225 18 7c0-.682-.057-1.35-.166-2A11.954 11.954 0 0110 1.944z" clip-rule="evenodd"/></svg>
        <span>DevVault</span>
      </div>
      <div class="topbar-actions">
        <button id="main-add-btn" class="icon-btn" aria-label="Save password">
          <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
        </button>
        <button id="main-settings-btn" class="icon-btn" aria-label="Settings">
          <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.5 2a1.5 1.5 0 00-3 0v.3c0 .6-.4 1.2-1 1.4-.1 0-.3.1-.4.2-.5.3-1.2.3-1.7-.1l-.2-.2a1.5 1.5 0 00-2.1 2.1l.2.2c.4.5.4 1.2.1 1.7-.1.1-.2.3-.2.4-.2.6-.8 1-1.4 1H1.5a1.5 1.5 0 000 3h.3c.6 0 1.2.4 1.4 1 0 .1.1.3.2.4.3.5.3 1.2-.1 1.7l-.2.2a1.5 1.5 0 002.1 2.1l.2-.2c.5-.4 1.2-.4 1.7-.1.1.1.3.2.4.2.6.2 1 .8 1 1.4v.3a1.5 1.5 0 003 0v-.3c0-.6.4-1.2 1-1.4.1 0 .3-.1.4-.2.5-.3 1.2-.3 1.7.1l.2.2a1.5 1.5 0 002.1-2.1l-.2-.2c-.4-.5-.4-1.2-.1-1.7.1-.1.2-.3.2-.4.2-.6.8-1 1.4-1h.3a1.5 1.5 0 000-3h-.3c-.6 0-1.2-.4-1.4-1 0-.1-.1-.3-.2-.4-.3-.5-.3-1.2.1-1.7l.2-.2a1.5 1.5 0 00-2.1-2.1l-.2.2c-.5.4-1.2.4-1.7.1-.1-.1-.3-.2-.4-.2-.6-.2-1-.8-1-1.4V2zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
        </button>
      </div>
    </header>

    <div class="content">
      <!-- Current site section -->
      <div class="section">
        <div class="section-header">
          <span class="section-label">Current site</span>
          <span id="current-url" class="section-meta"></span>
        </div>
        <div id="site-creds-list" class="creds-list"></div>
      </div>

      <div class="divider"></div>

      <!-- Vaults section -->
      <div class="section">
        <div class="section-header">
          <span class="section-label">Vaults</span>
          <span id="vault-count" class="section-meta"></span>
        </div>
        <div id="vaults-list" class="vaults-list"></div>
      </div>
    </div>

    <div class="bottom-bar">
      <button id="main-generate-btn" class="btn btn-ghost btn-sm">
        <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 2a1 1 0 011 1v1h1a1 1 0 010 2H6v1a1 1 0 01-2 0V6H3a1 1 0 010-2h1V3a1 1 0 011-1zm0 10a1 1 0 011 1v1h1a1 1 0 110 2H6v1a1 1 0 11-2 0v-1H3a1 1 0 110-2h1v-1a1 1 0 011-1zm7-10a1 1 0 01.967.744L14.146 7.2 17.5 8.512a1 1 0 010 1.876l-3.354 1.311-1.18 3.557a1 1 0 01-1.9 0l-1.18-3.557-3.354-1.311a1 1 0 010-1.876l3.354-1.312 1.18-3.556A1 1 0 0112 2z" clip-rule="evenodd"/></svg>
        Generate
      </button>
    </div>
  </div>

  <!-- VAULT SCREEN -->
  <div id="vault-screen" class="screen">
    <header class="topbar">
      <button id="vault-back-btn" class="icon-btn" aria-label="Back">
        <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.7 16.7a1 1 0 01-1.4 0l-6-6a1 1 0 010-1.4l6-6a1 1 0 011.4 1.4L5.4 9H17a1 1 0 110 2H5.4l4.3 4.3a1 1 0 010 1.4z" clip-rule="evenodd"/></svg>
      </button>
      <span id="vault-name" class="topbar-title"></span>
      <span id="vault-secret-count" class="topbar-meta"></span>
    </header>
    <div class="content" id="vault-secrets-list"></div>
  </div>

  <!-- SAVE SCREEN -->
  <div id="save-screen" class="screen">
    <header class="topbar">
      <button id="save-back-btn" class="icon-btn" aria-label="Back">
        <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.7 16.7a1 1 0 01-1.4 0l-6-6a1 1 0 010-1.4l6-6a1 1 0 011.4 1.4L5.4 9H17a1 1 0 110 2H5.4l4.3 4.3a1 1 0 010 1.4z" clip-rule="evenodd"/></svg>
      </button>
      <span class="topbar-title">Save password</span>
      <span></span>
    </header>
    <div class="content">
      <form id="save-form" class="form-stack">
        <div class="field">
          <label for="save-url">Website</label>
          <input type="text" id="save-url" placeholder="example.com">
        </div>
        <div class="field">
          <label for="save-username">Username</label>
          <input type="text" id="save-username" placeholder="Email or username" autocomplete="off">
        </div>
        <div class="field">
          <label for="save-password">Password</label>
          <div class="input-with-action">
            <input type="password" id="save-password" placeholder="Password" autocomplete="off">
            <button type="button" id="toggle-save-pw" class="input-action" aria-label="Toggle password">
              <svg class="icon eye-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M10 3C5.5 3 1.7 5.9.5 10c1.2 4.1 5 7 9.5 7s8.3-2.9 9.5-7c-1.2-4.1-5-7-9.5-7zm0 11.5c-2.5 0-4.5-2-4.5-4.5s2-4.5 4.5-4.5 4.5 2 4.5 4.5-2 4.5-4.5 4.5zm0-7.2c-1.5 0-2.7 1.2-2.7 2.7s1.2 2.7 2.7 2.7 2.7-1.2 2.7-2.7-1.2-2.7-2.7-2.7z"/></svg>
              <svg class="icon eye-off-icon hidden" viewBox="0 0 20 20" fill="currentColor"><path d="M3.7 2.3L2.3 3.7l3 3C3.2 8.2 1.6 9.9.5 10c1.2 4.1 5 7 9.5 7 1.7 0 3.3-.4 4.7-1.2l3.1 3.1 1.4-1.4-15.5-15.2zM10 15.5c-2.5 0-4.5-2-4.5-4.5 0-.9.3-1.7.7-2.4l1.5 1.5c0 .3-.2.6-.2.9 0 1.5 1.2 2.7 2.7 2.7.3 0 .6-.1.9-.2l1.5 1.5c-.8.3-1.6.5-2.6.5zm7.1-3.1c.5-.7.9-1.5 1.2-2.4-1.2-4.1-5-7-9.5-7-.8 0-1.6.1-2.3.3l1.7 1.7c.2 0 .4-.1.6-.1 2.5 0 4.5 2 4.5 4.5 0 .2 0 .4-.1.6l3.9 3.9z"/></svg>
            </button>
          </div>
          <div class="field-row">
            <div id="save-pw-strength" class="strength-bar" data-strength="0">
              <div class="strength-seg"></div><div class="strength-seg"></div><div class="strength-seg"></div><div class="strength-seg"></div>
            </div>
            <button type="button" id="save-generate-link" class="link-btn">Generate</button>
          </div>
        </div>
        <div class="field">
          <label for="save-vault">Vault</label>
          <select id="save-vault"></select>
        </div>
        <button type="submit" id="save-submit-btn" class="btn btn-primary btn-full">
          <span class="btn-text">Save</span>
          <span class="btn-loader hidden"><span class="loading"></span></span>
        </button>
      </form>
    </div>
  </div>

  <!-- GENERATOR SCREEN -->
  <div id="generator-screen" class="screen">
    <header class="topbar">
      <button id="gen-back-btn" class="icon-btn" aria-label="Back">
        <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.7 16.7a1 1 0 01-1.4 0l-6-6a1 1 0 010-1.4l6-6a1 1 0 011.4 1.4L5.4 9H17a1 1 0 110 2H5.4l4.3 4.3a1 1 0 010 1.4z" clip-rule="evenodd"/></svg>
      </button>
      <span class="topbar-title">Generator</span>
      <span></span>
    </header>
    <div class="content">
      <div class="gen-display">
        <code id="generated-pw" class="gen-password"></code>
        <div class="gen-actions">
          <button id="copy-generated-pw" class="icon-btn" aria-label="Copy">
            <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/><path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/></svg>
          </button>
          <button id="regenerate-btn" class="icon-btn" aria-label="Regenerate">
            <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.1a7 7 0 0111.9 2.5 1 1 0 11-1.8.6A5 5 0 005.7 7H8a1 1 0 010 2H3a1 1 0 01-1-1V3a1 1 0 011-1zm.2 9.4a1 1 0 011.2.8A5 5 0 0014.3 13H12a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.1a7 7 0 01-11.9-2.5 1 1 0 01.8-1.2z" clip-rule="evenodd"/></svg>
          </button>
        </div>
      </div>
      <div id="gen-pw-strength" class="strength-bar lg" data-strength="0">
        <div class="strength-seg"></div><div class="strength-seg"></div><div class="strength-seg"></div><div class="strength-seg"></div>
      </div>

      <div class="gen-controls">
        <div class="gen-slider">
          <label for="pw-length">Length</label>
          <div class="slider-row">
            <input type="range" id="pw-length" min="8" max="64" value="16">
            <span id="pw-length-val" class="slider-val">16</span>
          </div>
        </div>

        <div class="gen-toggles">
          <label class="toggle-row">
            <span>Uppercase</span>
            <span class="toggle-hint">A-Z</span>
            <input type="checkbox" id="pw-upper" checked>
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-row">
            <span>Lowercase</span>
            <span class="toggle-hint">a-z</span>
            <input type="checkbox" id="pw-lower" checked>
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-row">
            <span>Numbers</span>
            <span class="toggle-hint">0-9</span>
            <input type="checkbox" id="pw-numbers" checked>
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-row">
            <span>Symbols</span>
            <span class="toggle-hint">!@#$</span>
            <input type="checkbox" id="pw-symbols" checked>
            <span class="toggle-switch"></span>
          </label>
        </div>
      </div>

      <button id="use-password-btn" class="btn btn-primary btn-full">Use password</button>
    </div>
  </div>

  <!-- SETTINGS SCREEN -->
  <div id="settings-screen" class="screen">
    <header class="topbar">
      <button id="settings-back-btn" class="icon-btn" aria-label="Back">
        <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.7 16.7a1 1 0 01-1.4 0l-6-6a1 1 0 010-1.4l6-6a1 1 0 011.4 1.4L5.4 9H17a1 1 0 110 2H5.4l4.3 4.3a1 1 0 010 1.4z" clip-rule="evenodd"/></svg>
      </button>
      <span class="topbar-title">Settings</span>
      <span></span>
    </header>
    <div class="content">
      <div class="settings-section">
        <span class="section-label">Server</span>
        <div class="field">
          <div class="input-with-action">
            <input type="url" id="settings-api-url" placeholder="http://localhost:3000">
            <button type="button" id="settings-save-url-btn" class="input-action-text">Save</button>
          </div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="settings-section">
        <span class="section-label">Account</span>
        <div class="settings-row">
          <span class="settings-row-label">Email</span>
          <span id="settings-email" class="settings-row-value">--</span>
        </div>
        <button id="settings-signout-btn" class="btn btn-danger-ghost btn-full btn-sm">Sign out</button>
      </div>
      <div class="divider"></div>
      <div class="settings-section">
        <span class="section-label">About</span>
        <div class="settings-row">
          <span class="settings-row-label">Version</span>
          <span class="settings-row-value">1.0.0</span>
        </div>
        <div class="settings-row">
          <span class="settings-row-label">Built by</span>
          <span class="settings-row-value">nullfeel</span>
        </div>
      </div>
    </div>
  </div>

  <script src="src/utils.js"></script>
  <script src="src/popup.js"></script>
</body>
</html>
