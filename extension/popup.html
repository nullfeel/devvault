<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevVault</title>
  <link rel="stylesheet" href="src/popup.css">
</head>
<body>
  <div id="app">

    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
      <div class="login-container">
        <div class="login-brand">
          <h1 class="logo">DevVault</h1>
          <p class="login-subtitle">Sign in to DevVault</p>
        </div>
        <div class="login-form">
          <div class="input-group">
            <label for="login-email">EMAIL</label>
            <input type="email" id="login-email" class="input" placeholder="you@example.com" autocomplete="off">
          </div>
          <div class="input-group">
            <label for="login-password">PASSWORD</label>
            <div class="input-with-action">
              <input type="password" id="login-password" class="input" placeholder="Master password">
              <button id="login-pw-toggle" class="btn-icon input-action-btn" title="Show password">
                <svg class="icon eye-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M10 3C5.5 3 1.7 5.9.5 10c1.2 4.1 5 7 9.5 7s8.3-2.9 9.5-7c-1.2-4.1-5-7-9.5-7zm0 11.5c-2.5 0-4.5-2-4.5-4.5s2-4.5 4.5-4.5 4.5 2 4.5 4.5-2 4.5-4.5 4.5zm0-7.2c-1.5 0-2.7 1.2-2.7 2.7s1.2 2.7 2.7 2.7 2.7-1.2 2.7-2.7-1.2-2.7-2.7-2.7z"/></svg>
                <svg class="icon eye-off-icon hidden" viewBox="0 0 20 20" fill="currentColor"><path d="M3.7 2.3L2.3 3.7l3 3C3.2 8.2 1.6 9.9.5 10c1.2 4.1 5 7 9.5 7 1.7 0 3.3-.4 4.7-1.2l3.1 3.1 1.4-1.4-15.5-15.2zM10 15.5c-2.5 0-4.5-2-4.5-4.5 0-.9.3-1.7.7-2.4l1.5 1.5c0 .3-.2.6-.2.9 0 1.5 1.2 2.7 2.7 2.7.3 0 .6-.1.9-.2l1.5 1.5c-.8.3-1.6.5-2.6.5zm7.1-3.1c.5-.7.9-1.5 1.2-2.4-1.2-4.1-5-7-9.5-7-.8 0-1.6.1-2.3.3l1.7 1.7c.2 0 .4-.1.6-.1 2.5 0 4.5 2 4.5 4.5 0 .2 0 .4-.1.6l3.9 3.9z"/></svg>
              </button>
            </div>
          </div>
          <div id="login-error" class="error-text hidden"></div>
          <button id="login-btn" class="btn-primary">
            <span class="btn-text">Sign In</span>
            <span class="loading hidden"></span>
          </button>
        </div>
        <button id="login-server-link" class="server-link">
          Server: <span id="server-url-display">localhost:3000</span>
        </button>
      </div>
    </div>

    <!-- Main Screen -->
    <div id="main-screen" class="screen">
      <div class="header">
        <span class="logo">DevVault</span>
        <button id="main-settings-btn" class="btn-icon" title="Settings">
          <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.5 2a1.5 1.5 0 00-3 0v.3c0 .6-.4 1.2-1 1.4-.1 0-.3.1-.4.2-.5.3-1.2.3-1.7-.1l-.2-.2a1.5 1.5 0 00-2.1 2.1l.2.2c.4.5.4 1.2.1 1.7-.1.1-.2.3-.2.4-.2.6-.8 1-1.4 1H1.5a1.5 1.5 0 000 3h.3c.6 0 1.2.4 1.4 1 0 .1.1.3.2.4.3.5.3 1.2-.1 1.7l-.2.2a1.5 1.5 0 002.1 2.1l.2-.2c.5-.4 1.2-.4 1.7-.1.1.1.3.2.4.2.6.2 1 .8 1 1.4v.3a1.5 1.5 0 003 0v-.3c0-.6.4-1.2 1-1.4.1 0 .3-.1.4-.2.5-.3 1.2-.3 1.7.1l.2.2a1.5 1.5 0 002.1-2.1l-.2-.2c-.4-.5-.4-1.2-.1-1.7.1-.1.2-.3.2-.4.2-.6.8-1 1.4-1h.3a1.5 1.5 0 000-3h-.3c-.6 0-1.2-.4-1.4-1 0-.1-.1-.3-.2-.4-.3-.5-.3-1.2.1-1.7l.2-.2a1.5 1.5 0 00-2.1-2.1l-.2.2c-.5.4-1.2.4-1.7.1-.1-.1-.3-.2-.4-.2-.6-.2-1-.8-1-1.4V2zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
        </button>
      </div>

      <div class="content">
        <div class="search-bar">
          <svg class="icon search-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.9 3.5l4.3 4.3a1 1 0 01-1.4 1.4l-4.3-4.3A6 6 0 012 8z" clip-rule="evenodd"/></svg>
          <input type="text" id="search-input" class="search-input" placeholder="Search passwords...">
        </div>

        <div class="section">
          <div class="section-header">
            <span class="section-label">Current Site</span>
            <span id="current-url" class="section-meta"></span>
          </div>
          <div id="site-creds-list"></div>
        </div>

        <div class="divider"></div>

        <div class="section">
          <div class="section-header">
            <span class="section-label">All Vaults</span>
            <span id="vault-count" class="section-meta"></span>
          </div>
          <div id="vaults-list"></div>
        </div>
      </div>

      <div class="bottom-bar">
        <button id="gen-password-btn" class="btn-ghost">
          <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
          Generate
        </button>
        <button id="save-creds-btn" class="floating-btn" title="Save new credential">
          <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
        </button>
      </div>
    </div>

    <!-- Vault Screen -->
    <div id="vault-screen" class="screen">
      <div class="header">
        <div class="header-left">
          <button id="vault-back-btn" class="btn-icon nav-back" title="Back">
            <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.7 16.7a1 1 0 01-1.4 0l-6-6a1 1 0 010-1.4l6-6a1 1 0 011.4 1.4L5.4 9H17a1 1 0 110 2H5.4l4.3 4.3a1 1 0 010 1.4z" clip-rule="evenodd"/></svg>
          </button>
          <span id="vault-name" class="header-title"></span>
        </div>
      </div>
      <div class="content">
        <div id="vault-secrets-list"></div>
      </div>
    </div>

    <!-- Save Screen -->
    <div id="save-screen" class="screen">
      <div class="header">
        <div class="header-left">
          <button id="save-back-btn" class="btn-icon nav-back" title="Back">
            <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.7 16.7a1 1 0 01-1.4 0l-6-6a1 1 0 010-1.4l6-6a1 1 0 011.4 1.4L5.4 9H17a1 1 0 110 2H5.4l4.3 4.3a1 1 0 010 1.4z" clip-rule="evenodd"/></svg>
          </button>
          <span class="header-title">Save Password</span>
        </div>
      </div>
      <div class="content form-body">
        <div class="input-group">
          <label for="save-url">URL</label>
          <input type="url" id="save-url" class="input" placeholder="https://example.com">
        </div>
        <div class="input-group">
          <label for="save-username">USERNAME</label>
          <input type="text" id="save-username" class="input" placeholder="Email or username">
        </div>
        <div class="input-group">
          <label for="save-password">PASSWORD</label>
          <div class="input-with-action">
            <input type="password" id="save-password" class="input" placeholder="Enter password">
            <button id="toggle-save-pw" class="btn-icon input-action-btn" title="Show password">
              <svg class="icon eye-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M10 3C5.5 3 1.7 5.9.5 10c1.2 4.1 5 7 9.5 7s8.3-2.9 9.5-7c-1.2-4.1-5-7-9.5-7zm0 11.5c-2.5 0-4.5-2-4.5-4.5s2-4.5 4.5-4.5 4.5 2 4.5 4.5-2 4.5-4.5 4.5zm0-7.2c-1.5 0-2.7 1.2-2.7 2.7s1.2 2.7 2.7 2.7 2.7-1.2 2.7-2.7-1.2-2.7-2.7-2.7z"/></svg>
              <svg class="icon eye-off-icon hidden" viewBox="0 0 20 20" fill="currentColor"><path d="M3.7 2.3L2.3 3.7l3 3C3.2 8.2 1.6 9.9.5 10c1.2 4.1 5 7 9.5 7 1.7 0 3.3-.4 4.7-1.2l3.1 3.1 1.4-1.4-15.5-15.2zM10 15.5c-2.5 0-4.5-2-4.5-4.5 0-.9.3-1.7.7-2.4l1.5 1.5c0 .3-.2.6-.2.9 0 1.5 1.2 2.7 2.7 2.7.3 0 .6-.1.9-.2l1.5 1.5c-.8.3-1.6.5-2.6.5zm7.1-3.1c.5-.7.9-1.5 1.2-2.4-1.2-4.1-5-7-9.5-7-.8 0-1.6.1-2.3.3l1.7 1.7c.2 0 .4-.1.6-.1 2.5 0 4.5 2 4.5 4.5 0 .2 0 .4-.1.6l3.9 3.9z"/></svg>
            </button>
          </div>
          <button id="save-generate-link" class="inline-link">Generate</button>
          <div id="save-pw-strength" class="strength-bar">
            <div class="strength-segment"></div>
            <div class="strength-segment"></div>
            <div class="strength-segment"></div>
            <div class="strength-segment"></div>
          </div>
        </div>
        <div class="input-group">
          <label for="save-vault">VAULT</label>
          <select id="save-vault" class="select">
            <option value="">Select a vault...</option>
          </select>
        </div>
        <button id="save-submit-btn" class="btn-primary">
          <span class="btn-text">Save</span>
          <span class="loading hidden"></span>
        </button>
      </div>
    </div>

    <!-- Generator Screen -->
    <div id="generator-screen" class="screen">
      <div class="header">
        <div class="header-left">
          <button id="gen-back-btn" class="btn-icon nav-back" title="Back">
            <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.7 16.7a1 1 0 01-1.4 0l-6-6a1 1 0 010-1.4l6-6a1 1 0 011.4 1.4L5.4 9H17a1 1 0 110 2H5.4l4.3 4.3a1 1 0 010 1.4z" clip-rule="evenodd"/></svg>
          </button>
          <span class="header-title">Password Generator</span>
        </div>
      </div>
      <div class="content form-body">
        <div class="gen-display">
          <code id="generated-pw" class="gen-password">Click generate</code>
          <div class="gen-display-actions">
            <button id="copy-generated-pw" class="btn-icon" title="Copy">
              <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/><path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/></svg>
            </button>
            <button id="regenerate-btn" class="btn-icon" title="Regenerate">
              <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.1a7 7 0 0111.9 2.5 1 1 0 11-1.8.6A5 5 0 005.7 7H8a1 1 0 010 2H3a1 1 0 01-1-1V3a1 1 0 011-1zm.2 9.4a1 1 0 011.2.8A5 5 0 0014.3 13H12a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.1a7 7 0 01-11.9-2.5 1 1 0 01.8-1.2z" clip-rule="evenodd"/></svg>
            </button>
          </div>
        </div>
        <div id="gen-pw-strength" class="strength-bar">
          <div class="strength-segment"></div>
          <div class="strength-segment"></div>
          <div class="strength-segment"></div>
          <div class="strength-segment"></div>
        </div>

        <div class="gen-length-row">
          <label>Length</label>
          <div class="gen-length-control">
            <input type="range" id="pw-length" min="8" max="64" value="16">
            <span id="pw-length-val" class="gen-length-num">16</span>
          </div>
        </div>

        <div class="gen-options">
          <label class="toggle-row">
            <span class="toggle-label">Uppercase (A-Z)</span>
            <input type="checkbox" id="pw-upper" checked class="toggle-input">
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-row">
            <span class="toggle-label">Lowercase (a-z)</span>
            <input type="checkbox" id="pw-lower" checked class="toggle-input">
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-row">
            <span class="toggle-label">Numbers (0-9)</span>
            <input type="checkbox" id="pw-numbers" checked class="toggle-input">
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-row">
            <span class="toggle-label">Symbols (!@#$)</span>
            <input type="checkbox" id="pw-symbols" checked class="toggle-input">
            <span class="toggle-switch"></span>
          </label>
        </div>

        <button id="use-password-btn" class="btn-primary">Use Password</button>
      </div>
    </div>

    <!-- Settings Screen -->
    <div id="settings-screen" class="screen">
      <div class="header">
        <div class="header-left">
          <button id="settings-back-btn" class="btn-icon nav-back" title="Back">
            <svg class="icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.7 16.7a1 1 0 01-1.4 0l-6-6a1 1 0 010-1.4l6-6a1 1 0 011.4 1.4L5.4 9H17a1 1 0 110 2H5.4l4.3 4.3a1 1 0 010 1.4z" clip-rule="evenodd"/></svg>
          </button>
          <span class="header-title">Settings</span>
        </div>
      </div>
      <div class="content form-body">
        <div class="input-group">
          <label for="settings-api-url">SERVER URL</label>
          <input type="url" id="settings-api-url" class="input" placeholder="http://localhost:3000">
        </div>
        <button id="settings-save-url-btn" class="btn-primary">Save</button>

        <div class="divider"></div>

        <div class="settings-section">
          <span class="section-label">Account</span>
          <div class="settings-row">
            <span id="settings-email" class="settings-value">--</span>
            <button id="settings-logout-btn" class="btn-danger-text">Sign Out</button>
          </div>
        </div>

        <div class="divider"></div>

        <div class="settings-section">
          <span class="section-label">About</span>
          <p class="settings-about">DevVault v1.0.0</p>
          <p class="settings-about-sub">Built by nullfeel</p>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>
  </div>

  <script src="src/utils.js"></script>
  <script src="src/popup.js"></script>
</body>
</html>
